</g><text x="288" y="300" font-size="24" fill="#636e7b"># prune docker system — reclaim disk</text><text x="288" y="356" font-size="27" fill="#c9d1d9"><tspan fill="#58a6ff">$ </tspan>docker system prune -af --volumes</text><text x="288" y="402" font-size="27" fill="#c9d1d9"><tspan fill="#58a6ff">$ </tspan>docker compose down --remove-orphans</text><text x="288" y="448" font-size="27" fill="#c9d1d9"><tspan fill="#58a6ff">$ </tspan>docker image ls --filter dangling=true -q</text><rect x="288" y="512" width="1024" height="150" rx="14" fill="#161c25" stroke="#58a6ff" stroke-opacity="0.55" stroke-width="1.5"></rect><rect x="320" y="548" width="60" height="60" rx="12" fill="#58a6ff" fill-opacity="0.16"></rect><text x="334" y="592" font-size="26" fill="#58a6ff">&gt;_</text><text x="404" y="578" font-size="27" fill="#e6edf3">Prune Docker system</text><rect x="404" y="600" width="101" height="34" rx="17" fill="#58a6ff" fill-opacity="0.14" stroke="#58a6ff" stroke-opacity="0.45"></rect><text x="421" y="623.3" font-size="18" fill="#58a6ff">docker</text><rect x="517" y="600" width="112" height="34" rx="17" fill="#58a6ff" fill-opacity="0.14" stroke="#58a6ff" stroke-opacity="0.45"></rect><text x="534" y="623.3" font-size="18" fill="#58a6ff">cleanup</text><rect x="641" y="600" width="101" height="34" rx="17" fill="#58a6ff" fill-opacity="0.14" stroke="#58a6ff" stroke-opacity="0.45"></rect><text x="658" y="623.3" font-size="18" fill="#58a6ff">devops</text></svg>